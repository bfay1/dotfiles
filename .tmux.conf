# --- General Settings ---
set -g default-terminal "screen-256color" # Proper colors
set -g history-limit 10000                # Increase scrollback buffer
set -g mouse on                           # Enable mouse support (clicking, resizing)
set -w -g mode-keys vi                    # Use Vim keys in copy mode
set -g base-index 1                       # Start window numbering at 1
set -g pane-base-index 1                  # Start pane numbering at 1
set -g renumber-windows on                # Re-number windows when one is closed

# --- Keybindings ---

# Prefix
set -g prefix C-b
bind C-b send-prefix

# Easy config reload
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Better Split Commands (using | and -)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style Pane Navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Seamless pane navigation with vim-tmux-navigator: Ctrl-hjkl moves between
# tmux panes, or forwards to nvim's own splits when the active pane is nvim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Fast Pane Resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Visual Styling (habamax palette) ---

set -g status-style "bg=#1c1c1c,fg=#c7c7c7"

set -g pane-border-style "fg=#585858"
set -g pane-active-border-style "fg=#5f87af"

set -g status-left "#[bg=#5f87af,fg=#1c1c1c,bold] #S #[bg=#1c1c1c,fg=#5f87af,nobold]"
set -g status-left-length 20

set -g window-status-style "fg=#767676,bg=#1c1c1c"
set -g window-status-format " #I:#W "
set -g window-status-current-style "fg=#1c1c1c,bg=#9e9e9e,bold"
set -g window-status-current-format " #I:#W "

set -g status-right "#[fg=#767676]%Y-%m-%d #[fg=#d7af87]%H:%M "

set -g message-style "bg=#d7af87,fg=#1c1c1c"
set -g message-command-style "bg=#d7af87,fg=#1c1c1c"

run '~/.tmux/plugins/tpm/tpm'
